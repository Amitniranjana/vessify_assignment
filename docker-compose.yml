version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_extractor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/finance_extractor?schema=public
      - BETTER_AUTH_SECRET=supersecret123
      - PORT=8080
    depends_on:
      - postgres
    command: >
      sh -c "npx prisma db push && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - AUTH_SECRET=frontend_nextauth_secret123
    depends_on:
      - backend

volumes:
  pgdata:
